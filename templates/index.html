<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MantriPK Checker</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        h1 { color: #28a745; text-align: center; }
        textarea { width: 100%; height: 400px; padding: 12px; font-family: monospace; }
        button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #result { margin-top: 20px; background: white; padding: 15px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        .live { color: green; font-weight: bold; }
        .dead { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔥 MantriPK Balance Checker</h1>
    <textarea id="combos" placeholder="Mobile:Password\n917053735397:pass123"></textarea><br><br>
    <button onclick="startCheck()">🚀 Start Checking</button>
    <div id="result"></div>

    <script>
    function startCheck() {
        const combos = document.getElementById('combos').value.trim();
        if (!combos) return alert("Combos daal pehle!");

        document.getElementById('result').innerHTML = "<p>🔄 Checking started... Please wait</p>";

        fetch('/check', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({combos: combos})
        })
        .then(res => res.json())
        .then(data => {
            let html = `<h3>✅ Checking Complete! Live: ${data.live} / ${data.total}</h3>`;
            html += `<table><tr><th>Mobile</th><th>Status</th><th>Balance</th><th>Remark</th></tr>`;
            
            data.results.forEach(row => {
                html += `<tr>
                    <td>${row[0]}</td>
                    <td class="${row[1].includes('LIVE') ? 'live' : 'dead'}">${row[1]}</td>
                    <td>${row[2]}</td>
                    <td>${row[3]}</td>
                </tr>`;
            });
            html += `</table>`;
            document.getElementById('result').innerHTML = html;
        })
        .catch(() => {
            document.getElementById('result').innerHTML = "<p style='color:red'>Error occurred</p>";
        });
    }
    </script>
</body>
</html>
