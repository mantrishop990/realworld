<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MantriPK Checker</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        h1 { color: #28a745; text-align: center; }
        textarea { width: 100%; padding: 12px; font-family: monospace; margin-bottom: 10px; }
        button { padding: 12px 25px; font-size: 16px; margin: 5px; border: none; border-radius: 6px; cursor: pointer; }
        .start-btn { background: #28a745; color: white; }
        .proxy-on { background: #007bff; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        .live { color: green; font-weight: bold; }
        .dead { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔥 MantriPK Balance Checker</h1>

    <textarea id="combos" rows="12" placeholder="Mobile:Password&#10;917053735397:pass123&#10;..."></textarea>

    <label><input type="checkbox" id="useProxy"> Use Proxy</label><br><br>

    <textarea id="proxies" rows="6" placeholder="Proxy list daalo (ek line pe ek)&#10;http://user:pass@ip:port&#10;..."></textarea>

    <br><br>
    <button class="start-btn" onclick="startCheck()">🚀 Start Checking</button>

    <div id="result"></div>

    <script>
    function startCheck() {
        const combos = document.getElementById('combos').value.trim();
        const useProxy = document.getElementById('useProxy').checked;
        const proxies = document.getElementById('proxies').value.trim();

        if (!combos) {
            alert("Combos daal pehle!");
            return;
        }

        document.getElementById('result').innerHTML = "<p>🔄 Checking started... Please wait</p>";

        fetch('/check', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                combos: combos,
                use_proxy: useProxy,
                proxies: proxies
            })
        })
        .then(res => res.json())
        .then(data => {
            let html = `<h3>✅ Checking Complete!</h3>`;
            html += `<p><strong>Live Accounts: ${data.live} / ${data.total}</strong></p>`;

            if (data.results && data.results.length > 0) {
                html += `<table><tr><th>Mobile</th><th>Status</th><th>Balance</th><th>Remark</th></tr>`;
                data.results.forEach(row => {
                    html += `<tr>
                        <td>${row[0]}</td>
                        <td class="${row[1].includes('LIVE') ? 'live' : 'dead'}">${row[1]}</td>
                        <td>${row[2]}</td>
                        <td>${row[3]}</td>
                    </tr>`;
                });
                html += `</table>`;
            }
            document.getElementById('result').innerHTML = html;
        })
        .catch(() => {
            document.getElementById('result').innerHTML = "<p style='color:red'>Error occurred</p>";
        });
    }
    </script>
</body>
</html>
