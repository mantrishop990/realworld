<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MantriPK Real-Time Checker</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        h1 { color: #28a745; text-align: center; }
        textarea { width: 100%; height: 350px; padding: 12px; font-family: monospace; font-size: 15px; }
        button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #218838; }
        #result { margin-top: 20px; background: white; padding: 15px; border-radius: 8px; min-height: 400px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #f0f0f0; }
        .live { color: green; font-weight: bold; }
        .dead { color: red; font-weight: bold; }
        .progress { font-weight: bold; color: #007bff; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>🔥 MantriPK Real-Time Checker</h1>
    <textarea id="combos" placeholder="Mobile:Password&#10;917053735397:pass123&#10;..."></textarea><br><br>
    
    <button onclick="startRealTimeCheck()">🚀 Start Real-Time Checking</button>
    
    <div id="result"></div>

    <script>
    function startRealTimeCheck() {
        const combos = document.getElementById('combos').value.trim();
        if (!combos) {
            alert("Combos daal pehle!");
            return;
        }

        let html = `
            <h3>🔄 Checking Started...</h3>
            <div class="progress">Progress: 0 / 0</div>
            <table>
                <tr><th>Mobile</th><th>Status</th><th>Balance</th><th>Remark</th></tr>
            </table>`;
        document.getElementById('result').innerHTML = html;

        fetch('/check_stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ combos: combos })
        })
        .then(response => {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            function readStream() {
                reader.read().then(({ done, value }) => {
                    if (done) return;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');

                    lines.forEach(line => {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.replace('data: ', ''));
                                
                                if (data.type === "start") {
                                    document.querySelector('.progress').innerHTML = `Progress: 0 / ${data.total}`;
                                } 
                                else if (data.type === "complete") {
                                    document.querySelector('.progress').innerHTML = `✅ Complete! Live Accounts: ${data.live} / ${data.total}`;
                                } 
                                else {
                                    // Add row
                                    const table = document.querySelector('table');
                                    const row = `<tr>
                                        <td>${data.mobile}</td>
                                        <td class="${data.status.includes('LIVE') ? 'live' : 'dead'}">${data.status}</td>
                                        <td>${data.balance}</td>
                                        <td>${data.remark}</td>
                                    </tr>`;
                                    table.innerHTML += row;

                                    document.querySelector('.progress').innerHTML = `Progress: ${data.progress} / ${data.total} | Live: ${data.live}`;
                                }
                            } catch(e) {}
                        }
                    });

                    readStream();
                });
            }
            readStream();
        })
        .catch(err => {
            document.getElementById('result').innerHTML += `<p style="color:red">Error: ${err}</p>`;
        });
    }
    </script>
</body>
</html>
