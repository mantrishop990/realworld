<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MantriPK Checker</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
        h1 { color: #28a745; text-align: center; }
        textarea { width: 100%; height: 400px; padding: 12px; font-family: monospace; font-size: 15px; }
        button { padding: 15px 30px; font-size: 18px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px 0; }
        button:hover { background: #218838; }
        #result { margin-top: 20px; padding: 15px; background: white; border-radius: 8px; line-height: 1.8; }
        .live { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔥 MantriPK Balance Checker</h1>
    <textarea id="combos" placeholder="Mobile:Password&#10;917053735397:yourpassword&#10;917053735398:pass123"></textarea><br><br>
    
    <button onclick="startCheck()">🚀 Start Checking</button>
    
    <div id="result"></div>

    <script>
    function startCheck() {
        const combos = document.getElementById('combos').value.trim();
        if (!combos) {
            alert("Combos daal pehle!");
            return;
        }

        document.getElementById('result').innerHTML = "<p>🔄 Checking started... Please wait</p>";

        fetch('/check', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({combos: combos})
        })
        .then(res => res.json())
        .then(data => {
            let html = `<h3>✅ Checking Complete!</h3>`;
            html += `<p><strong>Live Accounts: ${data.live} / ${data.total}</strong></p>`;

            if (data.results && data.results.length > 0) {
                html += "<table border='1' style='width:100%; border-collapse:collapse;'><tr><th>Mobile</th><th>Status</th><th>Balance</th></tr>";
                data.results.forEach(row => {
                    html += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2] || '-'}</td></tr>`;
                });
                html += "</table>";
            }

            document.getElementById('result').innerHTML = html;
        })
        .catch(err => {
            document.getElementById('result').innerHTML = "<p style='color:red'>Error occurred while checking.</p>";
        });
    }
    </script>
</body>
</html>
